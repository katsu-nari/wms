<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LogiCore WMS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0c10;--surface:#111318;--surface2:#181c24;--border:#1e2330;
  --accent:#00e5a0;--warn:#ff6b35;--text:#e8eaf0;--text2:#7a8099;--text3:#3d4258;
  --green:#00e5a0;--red:#ff4757;--yellow:#ffd32a;--blue:#0066ff;
  --r:8px;--mono:"DM Mono",monospace;--sans:"Noto Sans JP",sans-serif;--disp:"Syne",sans-serif;
  --sbw:220px;--tbh:52px;--bnh:60px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;}

/* ===== LOGIN ===== */
.login-wrap{display:flex;align-items:center;justify-content:center;height:100vh;padding:20px;}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:36px 32px;width:100%;max-width:380px;}
.login-logo{text-align:center;margin-bottom:28px;}
.login-logo .logo-mark{width:48px;height:48px;background:var(--accent);border-radius:10px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:10px;}
.login-logo .logo-mark svg{width:24px;height:24px;fill:var(--bg);}
.login-logo h1{font-family:var(--disp);font-size:22px;font-weight:800;}
.login-logo p{font-family:var(--mono);font-size:10px;color:var(--text2);margin-top:2px;}
.login-err{background:rgba(255,71,87,.1);border:1px solid rgba(255,71,87,.2);border-radius:var(--r);padding:9px 12px;font-size:12px;color:var(--red);margin-bottom:14px;display:none;}
.login-pin{display:flex;gap:8px;justify-content:center;margin-top:6px;}
.login-pin input{width:42px;height:50px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;text-align:center;font-family:var(--mono);font-size:22px;font-weight:700;color:var(--accent);outline:none;transition:border-color .15s;}
.login-pin input:focus{border-color:var(--accent);}

/* ===== APP SHELL ===== */
.app{display:none;height:100vh;overflow:hidden;}
.app.active{display:flex;}
.sidebar{width:var(--sbw);min-width:var(--sbw);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;flex-shrink:0;}
.logo{padding:18px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.logo-mark{width:30px;height:30px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo-mark svg{width:16px;height:16px;fill:var(--bg);}
.logo-text{font-family:var(--disp);font-weight:800;font-size:15px;}
.logo-sub{font-family:var(--mono);font-size:9px;color:var(--text2);}
.nav-sec{padding:10px 8px 4px;}
.nav-lbl{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;padding:0 8px;margin-bottom:3px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r);cursor:pointer;transition:all .15s;color:var(--text2);font-size:12px;font-weight:500;border:1px solid transparent;}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:rgba(0,229,160,.08);color:var(--accent);border-color:rgba(0,229,160,.15);}
.nav-item svg{width:14px;height:14px;flex-shrink:0;}
.nav-item.role-admin{display:none;}
.sb-foot{margin-top:auto;padding:10px;border-top:1px solid var(--border);}
.user-pill{display:flex;align-items:center;gap:8px;padding:8px;border-radius:var(--r);background:var(--surface2);}
.avatar{width:26px;height:26px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:10px;color:#fff;flex-shrink:0;}
.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;min-width:0;}
.topbar{height:var(--tbh);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:8px;flex-shrink:0;}
.page-title{font-family:var(--disp);font-size:16px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.content{flex:1;overflow-y:auto;padding:14px;-webkit-overflow-scrolling:touch;}
.content::-webkit-scrollbar{width:3px;}
.content::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.mob-btn{display:none;background:none;border:none;color:var(--text2);cursor:pointer;padding:6px;}
.mob-btn svg{width:20px;height:20px;display:block;}
.drawer-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;}
.drawer-bg.open{display:block;}
.drawer{position:fixed;top:0;left:-270px;width:250px;height:100vh;background:var(--surface);z-index:201;transition:left .25s ease;overflow-y:auto;display:flex;flex-direction:column;}
.drawer.open{left:0;}
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:var(--bnh);background:var(--surface);border-top:1px solid var(--border);z-index:100;align-items:stretch;}
.bnav{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:var(--text3);transition:color .15s;position:relative;flex:1;}
.bnav.active{color:var(--accent);}
.bnav svg{width:18px;height:18px;}
.bnav-lbl{font-size:8px;font-weight:500;white-space:nowrap;}
.bnav-fab{width:40px;height:40px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;position:absolute;top:-14px;box-shadow:0 0 0 4px var(--bg);}
.bnav-fab svg{width:18px;height:18px;stroke:var(--bg);}

/* ===== COMPONENTS ===== */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--r);border:none;cursor:pointer;font-family:var(--sans);font-size:12px;font-weight:500;transition:all .15s;white-space:nowrap;}
.btn svg{width:12px;height:12px;}
.btn-p{background:var(--accent);color:var(--bg);}
.btn-p:hover{background:#00ffb3;}
.btn-g{background:transparent;color:var(--text2);border:1px solid var(--border);}
.btn-g:hover{background:var(--surface2);color:var(--text);}
.btn-sm{padding:4px 9px;font-size:11px;}
.btn-d{background:rgba(255,71,87,.1);color:var(--red);border:1px solid rgba(255,71,87,.2);}
.btn-d:hover{background:rgba(255,71,87,.2);}
.page{display:none;}
.page.active{display:block;}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:14px;}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px;position:relative;overflow:hidden;}
.kpi::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;}
.kpi.g::before{background:var(--green);}
.kpi.b::before{background:var(--blue);}
.kpi.y::before{background:var(--yellow);}
.kpi.r::before{background:var(--red);}
.kpi-lbl{font-family:var(--mono);font-size:9px;color:var(--text2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px;}
.kpi-val{font-family:var(--disp);font-size:24px;font-weight:800;line-height:1;margin-bottom:3px;}
.kpi-sub{font-size:10px;color:var(--text2);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);}
.card-hd{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;border-bottom:1px solid var(--border);}
.card-title{font-family:var(--disp);font-size:13px;font-weight:700;}
.card-body{padding:13px;}
.mb12{margin-bottom:12px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.g3{display:grid;grid-template-columns:2fr 1fr;gap:11px;}
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;}
th{text-align:left;padding:7px 10px;font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid var(--border);background:var(--surface2);white-space:nowrap;}
td{padding:8px 10px;border-bottom:1px solid var(--border);font-size:12px;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--surface2);}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:10px;font-family:var(--mono);font-size:9px;font-weight:500;white-space:nowrap;}
.bg{background:rgba(0,229,160,.12);color:var(--green);border:1px solid rgba(0,229,160,.2);}
.br{background:rgba(255,71,87,.12);color:var(--red);border:1px solid rgba(255,71,87,.2);}
.by{background:rgba(255,211,42,.12);color:var(--yellow);border:1px solid rgba(255,211,42,.2);}
.bb{background:rgba(0,102,255,.12);color:#4d9fff;border:1px solid rgba(0,102,255,.2);}
.bgr{background:rgba(122,128,153,.12);color:var(--text2);border:1px solid rgba(122,128,153,.2);}
.fg{display:flex;flex-direction:column;gap:10px;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.fl{display:flex;flex-direction:column;gap:4px;}
.flbl{font-family:var(--mono);font-size:10px;color:var(--text2);letter-spacing:.05em;}
.fi,.fs{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--text);font-family:var(--sans);font-size:13px;outline:none;transition:border-color .15s;width:100%;}
.fi:focus,.fs:focus{border-color:var(--accent);}
.fs option{background:var(--surface2);}
.tabs{display:flex;gap:2px;padding:3px;background:var(--surface2);border-radius:7px;margin-bottom:12px;}
.tab{flex:1;text-align:center;padding:6px 4px;border-radius:5px;cursor:pointer;font-size:11px;font-weight:500;color:var(--text2);transition:all .15s;white-space:nowrap;}
.tab.active{background:var(--surface);color:var(--text);}
.al{display:flex;align-items:flex-start;gap:9px;padding:9px 11px;border-left:2px solid transparent;margin-bottom:3px;border-radius:0 6px 6px 0;background:var(--surface2);}
.al.ae{border-color:var(--red);}
.al.aw{border-color:var(--warn);}
.al.ai{border-color:var(--blue);}
.aldot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;align-items:center;justify-content:center;padding:12px;}
.modal-ov.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;}
.modal.wide{max-width:820px;}
.modal-hd{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1;}
.modal-title{font-family:var(--disp);font-size:15px;font-weight:700;}
.modal-x{background:none;border:none;color:var(--text2);cursor:pointer;font-size:22px;line-height:1;padding:0 4px;}
.modal-body{padding:16px;}
.modal-ft{padding:11px 16px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:var(--surface);}
.toast-wrap{position:fixed;bottom:70px;right:12px;z-index:400;display:flex;flex-direction:column;gap:5px;}
.toast{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:9px 13px;min-width:180px;max-width:260px;display:flex;align-items:center;gap:8px;animation:slideUp .2s ease;font-size:12px;}
.toast.s{border-color:rgba(0,229,160,.3);}
.toast.e{border-color:rgba(255,71,87,.3);}
@keyframes slideUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.sbar{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:7px 10px;flex:1;}
.sbar input{background:none;border:none;outline:none;color:var(--text);font-family:var(--sans);font-size:12px;flex:1;min-width:0;}
.sbar svg{width:13px;height:13px;color:var(--text3);flex-shrink:0;}
.empty-state{text-align:center;padding:40px 20px;color:var(--text3);}
.empty-state .icon{font-size:36px;margin-bottom:10px;}
.empty-state p{font-size:13px;}
.pb{background:var(--surface2);border-radius:4px;height:5px;overflow:hidden;}
.pf{height:100%;border-radius:4px;transition:width .3s;}

@media(max-width:768px){
  .sidebar{display:none;}
  .bottom-nav{display:flex!important;}
  .mob-btn{display:block;}
  .desk-only{display:none!important;}
  .content{padding:11px;padding-bottom:calc(var(--bnh) + 11px);}
  .topbar{padding:0 10px;}
  .toast-wrap{bottom:calc(var(--bnh) + 6px);}
  .kpi-grid{grid-template-columns:1fr 1fr;gap:7px;}
  .kpi-val{font-size:20px;}
  .g2,.g3{grid-template-columns:1fr;}
  .fr{grid-template-columns:1fr;}
  .hm{display:none!important;}
  .modal-ov{padding:0;align-items:flex-end;}
  .modal{border-radius:14px 14px 0 0;max-height:88vh;}
}
</style>
</head>
<body>

<!-- ===== LOGIN PAGE ===== -->
<div id="loginPage" class="login-wrap">
  <div class="login-box">
    <div class="login-logo">
      <div class="logo-mark"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
      <h1>LogiCore</h1>
      <p>WAREHOUSE MANAGEMENT SYSTEM</p>
    </div>
    <div class="login-err" id="loginErr"></div>
    <div class="fg">
      <div class="fl">
        <div class="flbl">社員番号</div>
        <input class="fi" id="loginEmp" placeholder="E00001" autocomplete="off">
      </div>
      <div class="fl">
        <div class="flbl">パスワード（数字5桁）</div>
        <div class="login-pin">
          <input type="password" inputmode="numeric" maxlength="1" data-pin="0">
          <input type="password" inputmode="numeric" maxlength="1" data-pin="1">
          <input type="password" inputmode="numeric" maxlength="1" data-pin="2">
          <input type="password" inputmode="numeric" maxlength="1" data-pin="3">
          <input type="password" inputmode="numeric" maxlength="1" data-pin="4">
        </div>
      </div>
      <button class="btn btn-p" style="width:100%;justify-content:center;padding:11px;font-size:14px;margin-top:6px;" id="loginBtn" onclick="doLogin()">ログイン</button>
    </div>
  </div>
</div>

<!-- ===== APP SHELL ===== -->
<div class="app" id="appShell">

<!-- SIDEBAR (PC) -->
<nav class="sidebar" id="sidebarNav">
  <div class="logo">
    <div class="logo-mark"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
    <div><div class="logo-text">LogiCore</div><div class="logo-sub">WMS v4.0</div></div>
  </div>
  <div class="nav-sec">
    <div class="nav-lbl">MAIN</div>
    <div class="nav-item active" data-page="dashboard" onclick="go('dashboard',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>ダッシュボード</div>
    <div class="nav-item" data-page="inventory" onclick="go('inventory',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>在庫一覧</div>
  </div>
  <div class="nav-sec">
    <div class="nav-lbl">OPERATION</div>
    <div class="nav-item" data-page="inbound" onclick="go('inbound',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="8 17 12 21 16 17"/><line x1="12" y1="12" x2="12" y2="21"/></svg>入庫処理</div>
    <div class="nav-item" data-page="outbound" onclick="go('outbound',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 7 12 3 8 7"/><line x1="12" y1="3" x2="12" y2="12"/></svg>出庫処理</div>
    <div class="nav-item" data-page="move" onclick="go('move',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><line x1="21" y1="3" x2="14" y2="10"/><polyline points="9 21 3 21 3 15"/><line x1="3" y1="21" x2="10" y2="14"/></svg>ロケ移動</div>
    <div class="nav-item" data-page="stocktake" onclick="go('stocktake',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>棚卸</div>
  </div>
  <div class="nav-sec">
    <div class="nav-lbl">MASTER</div>
    <div class="nav-item" data-page="products" onclick="go('products',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>商品マスタ</div>
    <div class="nav-item" data-page="locations" onclick="go('locations',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>ロケーション</div>
    <div class="nav-item" data-page="suppliers" onclick="go('suppliers',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>仕入先マスタ</div>
  </div>
  <div class="nav-sec">
    <div class="nav-lbl">ADMIN</div>
    <div class="nav-item role-admin" data-page="reports" onclick="go('reports',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>レポート</div>
    <div class="nav-item role-admin" data-page="users" onclick="go('users',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>ユーザー管理</div>
  </div>
  <div class="sb-foot">
    <div class="user-pill" id="sbUser">
      <div class="avatar" id="sbAvatar">?</div>
      <div>
        <div style="font-size:12px;font-weight:500;" id="sbUserName">—</div>
        <div style="font-family:var(--mono);font-size:9px;color:var(--text2);" id="sbUserRole">—</div>
      </div>
      <button class="btn btn-g btn-sm" style="margin-left:auto;" onclick="doLogout()">退出</button>
    </div>
  </div>
</nav>

<!-- MOBILE DRAWER -->
<div class="drawer-bg" id="dBg" onclick="closeDrawer()"></div>
<nav class="drawer" id="drawer">
  <div class="logo" style="padding:14px 12px;">
    <div class="logo-mark"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
    <div><div class="logo-text">LogiCore</div><div class="logo-sub">WMS v4.0</div></div>
  </div>
  <div style="padding:6px;flex:1;" id="drawerLinks"></div>
  <div class="sb-foot">
    <div class="user-pill">
      <div class="avatar" id="drAvatar">?</div>
      <div style="font-size:12px;font-weight:500;" id="drUserName">—</div>
      <button class="btn btn-g btn-sm" style="margin-left:auto;" onclick="doLogout()">退出</button>
    </div>
  </div>
</nav>

<!-- MAIN AREA -->
<div class="main">
  <div class="topbar">
    <button class="mob-btn" onclick="openDrawer()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="page-title" id="pageTitle">ダッシュボード</div>
  </div>
  <div class="content">
    <div class="page active" id="page-dashboard"></div>
    <div class="page" id="page-inventory"></div>
    <div class="page" id="page-inbound"></div>
    <div class="page" id="page-outbound"></div>
    <div class="page" id="page-move"></div>
